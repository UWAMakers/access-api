name: Deploy prod infra

on:
  push:
    branches: [master]

jobs:
  docker_image_deploy:
    name: Deploy prod Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        # Set up QEMU to emulate non-native architectures (like ARM64 on AMD64 runners)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

        # Set up Docker Buildx for advanced multi-platform building capabilities
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          no-cache: true
          tags: uwashl/access:latest
